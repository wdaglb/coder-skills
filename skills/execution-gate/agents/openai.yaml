interface:
  display_name: "需求澄清门"
  short_description: "新增、修改、修复、调整前先做规划确认；确认后按计划推进"
  default_prompt: "使用 $execution-gate 处理新增、修改、调整、修复或继续已有任务：先输出任务理解、执行清单、歧义分级与执行计划；先完成规划确认，再进入实施；规划确认后默认按计划推进，只有偏离已定规划时才重新确认；若需要用户拍板，只输出 A / B / C / D 固定选项；若任务会产生正式改动且位于 Git 仓库中，再使用 $git-action 处理任务分支与高风险 Git 动作的选择边界。"
