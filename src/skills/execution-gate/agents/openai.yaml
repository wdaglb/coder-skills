interface:
  display_name: "需求澄清门"
  short_description: "实质执行前先过统一门禁；覆盖显式实现请求与需求列表式隐含实施请求"
  default_prompt: "使用 $execution-gate 处理新增、增加、补充、调整、修复、排查、生成、实现或继续已有任务，包括直接给出需求列表、业务规则、报表口径、生成条件、参与度口径等隐含要求落地的场景：先输出任务理解、歧义分级与风险；轻歧义任务直接执行，不额外询问决策；重歧义任务显式转交 $ambiguity-planner 做分步收敛；拿不准时一律按重歧义处理；若任务会产生正式改动且位于 Git 仓库中，再使用 $git-action 处理任务分支与高风险 Git 动作的选择边界。"
